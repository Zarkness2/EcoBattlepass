categories:
  - id: daily # The category ID, must be unique
    name: "&8»&e Daily Challenges" # The name of the category
    item: emerald unbreaking:1 hide_enchants # The item to display in the GUI
    lore: # The lore of the category
      - "&a%completed%/%total% Complete"
      - "&7%xbattlepass_category_daily_reset_timer% until reset"
    start-date: 2025-03-23 00:00 # The date the category starts %xbattlepass_category_<id>_start_date%.
    duration: -1 # (Optional) The duration of the category in minutes, set to -1 for no end. Defaults to -1 %xbattlepass_category_<id>_duration%
    reset-time: 1440 # (Optional) The amount of minutes between resets, set to 1440 for daily resets, set to -1 to not reset. Defaults to -1 %xbattlepass_category_<id>_reset_timer%
    quests: # The quests in the category
      - id: free_daily_quest_1 # The ID of the quest
      - id: free_daily_quest_2 # The ID of the quest
      - id: free_daily_quest_3 # The ID of the quest
      - id: free_daily_quest_4 # The ID of the quest
      - id: free_daily_quest_5 # The ID of the quest
      - id: free_daily_quest_6 # The ID of the quest
      - id: free_daily_quest_7 # The ID of the quest

  - id: weekly_1 # The category ID, must be unique
    name: "&8»&e Week 1 Challenges" # The name of the category
