# The ID of the reward is the name of the .yml file,
# for example diamond_block.yml has the ID of diamond_block
# You can place rewards anywhere in this folder,
# including in subfolders if you want to organize your reward configs
# _example.yml is not loaded.

display:
  name: "&lLucky Armor" # The display name of the reward
  reward-lore:
    - "&7Unbreaking III" # The lore of the reward. This is shown on the tier within %rewards%. Formatting here will override config.yml
    - "&7Density V"
    - "&7Mending I"
    - "&7Wind Burst III"

# Effects to run when the battlepass reward is claimed.
# %level% is the tier the battlepass levelled up to.
# You can only use Triggered Effects here.
effects:
  - id: give_item
    args:
      item: mace 1 unbreaking:3 density:5 mending:1 wind_burst:3 name:"&6&lLucky Mace"