# The ID of the reward is the name of the .yml file,
# for example diamond_block.yml has the ID of diamond_block
# You can place rewards anywhere in this folder,
# including in subfolders if you want to organize your reward configs
# _example.yml is not loaded.

display:
  name: "&lLucky Weapons" # The display name of the reward
  reward-lore:
    - "&7Sharpness V" # The lore of the reward. This is shown on the tier within %rewards%. Formatting here will override config.yml
    - "&7Unbreaking III"
    - "&7Mending I"
    - "&7Looting III"
    - "&7Power V"
    - "&7Infinity I"

# Effects to run when the battlepass reward is claimed.
# %level% is the tier the battlepass levelled up to.
# You can only use Triggered Effects here.
effects:
  - id: give_item
    args:
      items:
        - netherite_sword 1 sharpness:5 looting:3 unbreaking:3 mending:1 name:"&6&lLucky Sword"
        - bow 1 power:5 infinity:1 looting:3 unbreaking:3 name:"&6&lLucky Bow"

