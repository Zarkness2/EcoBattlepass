# The ID of the reward is the name of the .yml file,
# for example diamond_block.yml has the ID of diamond_block
# You can place rewards anywhere in this folder,
# including in subfolders if you want to organize your reward configs
# _example.yml is not loaded.

display:
  name: "&lLucky Armor" # The display name of the reward
  reward-lore:
    - "&7Protection IV" # The lore of the reward. This is shown on the tier within %rewards%. Formatting here will override config.yml
    - "&7Unbreaking III"
    - "&7Mending I"

# Effects to run when the battlepass reward is claimed.
# %level% is the tier the battlepass levelled up to.
# You can only use Triggered Effects here.
effects:
  - id: give_item
    args:
      items:
        - netherite_helmet 1 protection:4 unbreaking:3 mending:1 name:"&6&lLucky Helmet"
        - netherite_chestplate 1 protection:4 unbreaking:3 mending:1 name:"&6&lLucky Chestplate"
        - netherite_leggings 1 protection:4 unbreaking:3 mending:1 name:"&6&lLucky Leggings"
        - netherite_boots 1 protection:4 unbreaking:3 mending:1 name:"&6&lLucky Boots"