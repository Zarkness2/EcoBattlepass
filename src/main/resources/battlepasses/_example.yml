# The ID of the battlepass is the name of the .yml file,
# for example halloween_pass.yml has the ID of halloween_pass
# You can place battlepasses anywhere in this folder,
# including in subfolders if you want to organize your battlepass configs
# _example.yml is not loaded.

name: "&6Example Battlepass" # The name of the battlepass, shown in the GUI
battlepass:
  xp-formula: 1.5 * %level% + 5 # The formula to calculate the XP needed to reach the next tier
  max-tier: 100 # The maximum tier of the battlepass
  command: 'battlepass' # The command to open the battlepass GUI
  premium-permission: "example.pass.premium" # The permission required to access the premium path of the battlepass
  battlepass-start: 2025-01-01 00:00 # The date the battlepass starts. Format: YYYY-MM-DD HH:MM
  battlepass-end: 2025-05-01 00:00 # The date the battlepass ends. Format: YYYY-MM-DD HH:MM

# Below are the tier rewards for the battlepass.
# The tier is the level the player needs to reach to unlock the rewards.
# The rewards are the rewards the player will receive when they reach the tier.
# You can add as many tiers and rewards as you want.
# Not every tier needs to have a reward, if you want a tier to have no reward, just don't add that tier.
tiers:
  - tier: 1 # The tier number
    rewards:
      - id: coins_5000 # The ID of the reward
        tier: free # If the reward is locked to a battlepass path. Set to "free" to allow all players to claim it.
      - id: coins_10000 # The ID of the reward
        tier: premium # The tier the reward is in (free/premium)
      - id: golden_apple_3
        tier: premium

  - tier: 5
    rewards:
      - id: xp_100
        tier: premium
