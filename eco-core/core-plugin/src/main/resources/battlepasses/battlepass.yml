name: "&6Season 1 Battlepass"

battlepass:
  xp-formula: 1250 # The formula to calculate the XP needed to reach the next tier
  max-tier: 100 # The maximum tier of the battle pass
  command: "battlepass" # The command to open the battle pass GUI
  premium-permission: "ecobattlepass.pass.premium" # The permission required to access the premium path
  battlepass-start: 2025-01-01 00:00 # The date the battle pass starts, used for scheduling start. This must match the date format in config.yml, otherise you will get errors.
  battlepass-end: 2027-01-01 00:00 # The date the battle pass starts, used for scheduling start. This must match the date format in config.yml, otherise you will get errors.

# Below are the tier rewards for the battlepass.
# The tier is the level the player needs to reach to unlock the rewards.
# The rewards are the rewards the player will receive when they reach the tier.
# You can add as many tiers and rewards as you want.
# Not every tier needs to have a reward, if you want a tier to have no reward, just don't add that tier.
tiers:
  - tier: 1 # The tier number
    rewards:
      - id: coins_5000 # The ID of the reward
        tier: free # If the reward is locked to a battlepass path. Set to "free" to allow all players to claim it.
      - id: coins_10000 # The ID of the reward
        tier: premium # The tier the reward is in (free/premium)
      - id: golden_apple_3
        tier: premium

  - tier: 2
    rewards:
      - id: xp_100
        tier: premium

  - tier: 4
    rewards:
      - id: steak_32
        tier: free
      - id: steak_64
        tier: premium
      - id: golden_carrot_16
        tier: premium

  - tier: 6
    rewards:
      - id: cow_spawner_1
        tier: premium

  - tier: 7
    rewards:
      - id: iron_sword_s2
        tier: free
      - id: diamond_sword_s3
        tier: premium

  - tier: 9
    rewards:
      - id: xp_bottles_5
        tier: free
      - id: xp_bottles_15
        tier: premium
      - id: random_enchant_book
        tier: premium

  - tier: 10
    rewards:
      - id: crafting_table_command
        tier: premium
    display:
      locked:
        item: barrier
        name: "&4&lLEGENDARY TIER"
        lore:
          - "&cReach tier 50 to unlock!"
      unlocked:
        item: dragon_egg
        name: "&5&lLEGENDARY TIER 50"
      claimed:
        item: end_portal_frame
        name: "&5&lLEGENDARY TIER 50"

  - tier: 12
    rewards:
      - id: coins_10000
        tier: free
      - id: coins_20000
        tier: premium

  - tier: 14
    rewards:
      - id: random_enchant_book
        tier: premium

  - tier: 16
    rewards:
      - id: cow_spawner_1
        tier: free
      - id: cow_spawner_1
        tier: premium

  - tier: 18
    rewards:
      - id: unbreaking_3_book
        tier: free
      - id: protection_4_book
        tier: premium

  - tier: 20
