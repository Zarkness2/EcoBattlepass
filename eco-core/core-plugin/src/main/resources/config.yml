# EcoBattlepass Configuration
# by Exanthiax, _OfTeN_, Auxilor
#

# The amount of time (in milliseconds) that the GUI icons should be cached for
# Prevents spamming the GUI to cause lag
gui-cache-ttl: 1000

# GUI Configuration for the Battlepass GUI (/battlepass)
battlepass-gui:
  title: "EcoBattlepass"
  mask:
    # The way the mask works is by having a list of materials
    # And then a pattern to use those materials.

    # The pattern is the rows in the GUI
    # Each line must be 9 long, and the amount of rows should be the amount of rows in the GUI
    # A zero represents nothing
    # A 1 represents the first material
    # A 2 represents the second material
    # And so on, you can add up to 9.
    materials:
      - black_stained_glass_pane
    pattern:
      - "111111111"
      - "111010111"
      - "111111111"

  buttons:
    tiers:
      # Supports PlaceholderAPI placeholders, resolved per-player at display time. Examples:
      # item: player_head name:%player_name%         # Player's own head
      # item: diamond_sword                          # A simple item
      item: lime_stained_glass_pane
      name: "&aTiers"
      lore:
        - ""
        - "&aLeft click &7to see your"
        - "&7battlepass progression"
        - "&7and claim rewards"
        - ""
        - "&7Tier: &a%tier%"
        - "&7XP: &a%current_bp_xp%&8/&a%required_bp_xp%"
        - "&7Progress: &a%percentage_progress%%"
        - "&7Claimable Tiers: &a%claimable_tiers%"
      location:
        row: 2
        column: 4

    # List of available placeholders:
    # https://exanthiax.gitbook.io/ecobattlepass/useful/internal-placeholders#battlepass-and-category-gui

    quests:
      item: orange_stained_glass_pane
      name: "&6Quests"
      lore:
        - ""
        - "&6Left click &7to see"
        - "&7all available quests"
        - "&7and your progression"
        - ""
      location:
        row: 2
        column: 6

    close:
      enabled: true
      material: barrier
      name: "&cClose"
      location:
        row: 3
        column: 5

    # Custom GUI slots; see here for a how-to: https://plugins.auxilor.io/all-plugins/custom-gui-slots
    custom-slots: []

# GUI Configuration for the Tiers GUI (/battlepass tiers)
tiers-gui:
  # Supports %page% and %max_page% placeholders
  title: "EcoBattlepass: Tiers (%page%/%max_page%)"

  # Layout mode: "combined" (default, original behavior) or "split" (free on one row, premium on another)
  layout: "combined"

  # How to display tiers with no rewards:
  # "normal"              - Empty tiers show with their real state (original behavior)
  # "hidden"              - All empty tiers are invisible
  # "hidden-behind-level" - Empty tiers at or below the player's level are hidden; others show normal
  # "behind-level"        - Empty tiers at or below the player's level show as claimed; others show normal
  # "all"                 - All empty tiers show as claimed regardless of level
  empty-tier-display-mode: "normal"

  # Whether to open the tiers GUI at the player's current tier page.
  # Set to false to always open at page 1.
  open-at-current-tier: true

  mask:
    # The way the mask works is by having a list of materials
    # And then a pattern to use those materials.

    # The pattern is the rows in the GUI
    # Each line must be 9 long, and the amount of rows should be the amount of rows in the GUI
    # A zero represents nothing
    # A 1 represents the first material
    # A 2 represents the second material
    # And so on, you can add up to 9.
    materials:
      - black_stained_glass_pane
    pattern:
      - "111111111"
      - "111111111"
      - "111111111"
      - "111111111"
      - "111111111"
      - "111111111"
    progression-pattern:
      # To set the order of the pattern,
      # Use 1-9 and then a-z: a goes after 9.
      # Used when layout is "combined" (default).
      - "109ab0jkl"
      - "2080c0i0m"
      - "3070d0h0n"
      - "4560efg0o"
      - "00000000p"
      - "00000000q"

  # Split layout configuration (only used when layout is "split")
  # Each pattern defines where tiers appear for free and premium rows respectively.
  # Uses the same 1-9 + a-z system as progression-pattern.
  split:
    free-pattern:
      - "000000000"
      - "123456789"
      - "000000000"
      - "000000000"
      - "000000000"
      - "000000000"
    premium-pattern:
      - "000000000"
      - "000000000"
      - "000000000"
      - "123456789"
      - "000000000"
      - "000000000"

  buttons:
    # The amount of the item as a function of the level
    item-amount: "%level%"
    # For example, increasing every 10 levels would be "ceil((%level% + 1) / 10)"
    # The value is always rounded down.

    # Maximum item stack size for tier items (1-99).
    # Values above 64 require Paper 1.20.5+ (uses setMaxStackSize).
    # Invalid values will default to 64 with a console warning.
    max-item-amount: 64

    # Page changers support multiple formats:
    # Format 1 (new, recommended):
    #   item:
    #     active: "orange_stained_glass_pane"
    #     inactive: "gray_stained_glass_pane"
    #   name:
    #     active: "&aPrevious page"
    #     inactive: "&7No more pages"
    #
    # Format 2 (inline name in item string):
    #   item:
    #     active: orange_stained_glass_pane name:"&aPrevious page"
    #     inactive: gray_stained_glass_pane
    #
    # Format 3 (legacy, single material + name):
    #   material: orange_stained_glass_pane
    #   name: "&aPrevious page"
    #
    # All three formats are supported for backward compatibility.

    prev-page:
      item:
        active: orange_stained_glass_pane
        inactive: gray_stained_glass_pane
      name:
        active: "&aPrevious page"
        inactive: "&7No more pages"
      lore:
        active: []
        inactive: []
      location:
        row: 6
        column: 4

    next-page:
      item:
        active: orange_stained_glass_pane
        inactive: gray_stained_glass_pane
      name:
        active: "&aNext Page"
        inactive: "&7No more pages"
      lore:
        active: []
        inactive: []
      location:
        row: 6
        column: 6

    close:
      enabled: true
      # Supports both "material" (legacy) and "item" key.
      # Also supports separate "name" key or inline name in item string.
      item: barrier
      name: "&cClose"
      location:
        row: 6
        column: 5

    # Reward placeholders documentation:
    # These placeholders are used in tier button lore to display rewards
    #
    # %free-rewards% - Shows unclaimed free rewards (one per line)
    # %premium-rewards% - Shows unclaimed premium rewards (one per line)
    # %claimed-free-rewards% - Shows claimed free rewards (one per line)
    # %claimed-premium-rewards% - Shows claimed premium rewards (one per line)
    #
    # IMPORTANT: These placeholders will show blank lines if there are no rewards of that type
    # For example, if a tier has no free rewards, %free-rewards% will show nothing
    # This is intentional - it allows you to conditionally show reward sections
    #
    # Dynamic placeholders for accessing specific reward lines (useful for custom GUI slots):
    # tier_free_reward_{battlepass_id}_{tier_number}_{line_index}
    # tier_premium_reward_{battlepass_id}_{tier_number}_{line_index}
    # tier_claimed_free_reward_{battlepass_id}_{tier_number}_{line_index}
    # tier_claimed_premium_reward_{battlepass_id}_{tier_number}_{line_index}
    #
    # Example: tier_free_reward_battlepass_10_0 returns the first line of free rewards for tier 10
    # Example: tier_premium_reward_battlepass_10_1 returns the second line of premium rewards for tier 10
    # If the line index is out of bounds, it returns an empty string

    empty-rewards-format: "&8&oNo rewards for this tier!"
    free-rewards-format: "&8»&r &9%reward%"
    premium-rewards-format: "&8»&r &6%reward%"
    missing-premium-rewards-format: "&c&l✘ &6%reward%"
    claimed-free-rewards-format: "&a&l✔ &9%reward%"
    claimed-premium-rewards-format: "&a&l✔ &6%reward%"

    # List of available placeholders:
    # https://exanthiax.gitbook.io/ecobattlepass/useful/internal-placeholders#battlepass-tiers-gui

    # Per-level item overrides documentation:
    # You can override button items for specific tiers in the battlepass tier config files
    # Structure in tier config (e.g., battlepasses/yourpass/tiers/10.yml):
    #   display:
    #     {state}.item: material
    #     {state}.name: display name
    #     {state}.lore: [lore lines]
    #
    # States: unlocked, locked, in-progress, claimed, unlocked-free, premium-required, hidden
    #
    # For split mode, you can also specify track-specific overrides:
    #   display:
    #     free-track.{state}.item: material
    #     premium-track.{state}.item: material
    #
    # Priority: track-specific override > generic override > track-specific config > default config
    #
    # Example (in tier config):
    #   display:
    #     unlocked.item: diamond
    #     unlocked.name: "&6Special Tier %tier_numeral%"
    #     free-track.unlocked.item: emerald
    #     premium-track.unlocked.item: diamond

    # The different states a tier can be in
    # When only the free rewards are claimable.
    unlocked-free:
      item: lime_stained_glass_pane
      name: "&aTier %tier_numeral%"
      lore:
        - "&7Rewards:"
        - "&7Free Tier:"
        - "%free-rewards%"
        - "&7Premium Tier:"
        - "%premium-rewards%"
        - ""
        - "&aCLAIM"

    # When both the free and premium rewards are claimable.
    unlocked:
      item: lime_stained_glass_pane
      name: "&aTier %tier_numeral%"
      lore:
        - "&7Rewards:"
        - "&7Free Tier:"
        - "%free-rewards%"
        - "&7Premium Tier:"
        - "%premium-rewards%"
        - ""
        - "&aCLAIM"

    # When the free rewards have been claimed, but the premium rewards are not claimable due to missing premium.
    premium-required:
      item: orange_stained_glass_pane
      name: "&aTier %tier_numeral%"
      lore:
        - "&7Rewards:"
        - "&7Free Tier:"
        - "%claimed-free-rewards%"
        - "&7Premium Tier:"
        - "%premium-rewards%"
        - ""
        - "&6PURCHASE THE BATTLEPASS TO CLAIM PREMIUM REWARDS"

    # When the tier is not claimable yet, but is the next tier to be claimed.
    in-progress:
      item: yellow_stained_glass_pane
      name: "&eTier %tier_numeral%"
      lore:
        - "&7Rewards:"
        - "&7Free Tier:"
        - "%free-rewards%"
        - "&7Premium Tier:"
        - "%premium-rewards%"
        - ""
        - "&fProgress:"
        - "&8» &e%percentage_progress%%"
        - "&8» &e%current_bp_xp%&8/&7%required_bp_xp% &fXP"

    # When the tier is not claimable yet, and is not the next tier to be claimed.
    locked:
      item: red_stained_glass_pane
      name: "&cTier %tier_numeral%"
      lore:
        - "&7Rewards:"
        - "&7Free Tier:"
        - "%free-rewards%"
        - "&7Premium Tier:"
        - "%premium-rewards%"
        - ""
        - "&cLOCKED"

    # When all rewards have been claimed.
    claimed:
      item: green_stained_glass_pane glint
      name: "&aTier %tier_numeral%"
      lore:
        - "&7Rewards:"
        - "&7Free Tier:"
        - "%claimed-free-rewards%"
        - "&7Premium Tier:"
        - "%claimed-premium-rewards%"
        - ""
        - "&aCLAIMED"

    # Split mode button configurations (only used when layout: split)
    # These override the default buttons for their respective tracks
    free-track:
      unlocked:
        item: lime_stained_glass_pane
        name: "&aFree Tier %tier_numeral%"
        lore:
          - "&7Free Rewards:"
          - "%free-rewards%"
          - ""
          - "&aCLAIM"
      locked:
        item: red_stained_glass_pane
        name: "&cFree Tier %tier_numeral%"
        lore:
          - "&7Free Rewards:"
          - "%free-rewards%"
          - ""
          - "&cLOCKED"
      in-progress:
        item: yellow_stained_glass_pane
        name: "&eFree Tier %tier_numeral%"
        lore:
          - "&7Free Rewards:"
          - "%free-rewards%"
          - ""
          - "&fProgress:"
          - "&8» &e%percentage_progress%%"
      claimed:
        item: green_stained_glass_pane glint
        name: "&aFree Tier %tier_numeral%"
        lore:
          - "&7Free Rewards:"
          - "%claimed-free-rewards%"
          - ""
          - "&aCLAIMED"

    premium-track:
      unlocked:
        item: cyan_stained_glass_pane
        name: "&bPremium Tier %tier_numeral%"
        lore:
          - "&7Premium Rewards:"
          - "%premium-rewards%"
          - ""
          - "&aCLAIM"
      premium-required:
        item: orange_stained_glass_pane
        name: "&6Premium Tier %tier_numeral%"
        lore:
          - "&7Premium Rewards:"
          - "%premium-rewards%"
          - ""
          - "&6PURCHASE THE BATTLEPASS TO CLAIM"
      locked:
        item: red_stained_glass_pane
        name: "&cPremium Tier %tier_numeral%"
        lore:
          - "&7Premium Rewards:"
          - "%premium-rewards%"
          - ""
          - "&cLOCKED"
      in-progress:
        item: yellow_stained_glass_pane
        name: "&ePremium Tier %tier_numeral%"
        lore:
          - "&7Premium Rewards:"
          - "%premium-rewards%"
          - ""
          - "&fProgress:"
          - "&8» &e%percentage_progress%%"
      claimed:
        item: green_stained_glass_pane glint
        name: "&aPremium Tier %tier_numeral%"
        lore:
          - "&7Premium Rewards:"
          - "%claimed-premium-rewards%"
          - ""
          - "&aCLAIMED"

    # Custom GUI slots; see here for a how-to: https://plugins.auxilor.io/all-plugins/custom-gui-slots
    custom-slots: []

# GUI Configuration for the Categories GUI (/battlepass quests)
categories-gui:
  title: "&8Categories: %page%"
  mask:
    # The way the mask works is by having a list of materials
    # And then a pattern to use those materials.

    # The pattern is the rows in the GUI
    # Each line must be 9 long, and the amount of rows should be the amount of rows in the GUI
    # A zero represents nothing
    # A 1 represents the first material
    # A 2 represents the second material
    # And so on, you can add up to 9.
    materials:
      - black_stained_glass_pane
    pattern:
      # For this GUI, "c" represents a slot for a category.
      # Categories are sorted in the order they are in the categories.yml file.
      - "111111111"
      - "1c1c1c1c1"
      - "1111c1111"
      - "111111111"
      - "111111111"

  buttons:
    next-page:
      item:
        active: orange_stained_glass_pane
        inactive: gray_stained_glass_pane
      name:
        active: "&aNext page"
        inactive: ""
      lore:
        active: []
        inactive: []
      row: 5
      column: 6
    prev-page:
      item:
        active: orange_stained_glass_pane
        inactive: gray_stained_glass_pane
      name:
        active: "&aPrevious page"
        inactive: ""
      lore:
        active: []
        inactive: []
      row: 5
      column: 4
    close:
      enabled: true
      item: barrier
      name: "&cClose"
      row: 5
      column: 5

    # List of available placeholders:
    # https://exanthiax.gitbook.io/ecobattlepass/useful/internal-placeholders#battlepass-and-category-gui

    # Custom GUI slots; see here for a how-to: https://plugins.auxilor.io/all-plugins/custom-gui-slots
    custom-slots: []

