# The ID of the quest is the name of the .yml file,
# for example mining.yml has the ID of mining
# You can place quests anywhere in this folder,
# including in subfolders if you want to organize your quest configs
# _example.yml is not loaded.

display:
  # Supports PlaceholderAPI placeholders, resolved per-player at display time. Examples:
  # item: player_head name:%player_name%         # Player's own head
  # item: diamond_sword                          # A simple item
  item: player_head texture:eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNGU4ZjNlYTQ2NzM1YWQwYzEwNmM1NDljY2I2Y2Q0ODljOTdhNDFlNzNkMDkyNDk3ZWU0MjRiZWNkOWRmZDI5YyJ9fX0= # The item to display in the GUI
  display-name: Chickens # The display name of the quest
  description: [] # The description of the quest

battlepass-points: 100 # The amount of battlepass points awarded

# Which battlepass path this quest is locked to:
#   "free"    — All players can see and complete this quest.
#   "premium" — Only players with the premium permission can see and complete this quest.
# This is shown in the quest GUI via the %quest_tier% placeholder.
battlepass-tier: premium

tasks: # The list of tasks
  - id: click_doors # The ID of the task
    xp: 100 # The amount of XP required

task-amount: 1 # The amount of tasks that need to be completed
